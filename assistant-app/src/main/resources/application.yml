server:
  port: 8080

spring:
  application:
    name: assistant-app
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration

assistant:
  cors:
    allowed-origins:
      - http://localhost:4321
  mcp:
    countries:
      # spring-boot:run launches the JVM with cwd = assistant-app/, so the jar path is relative to
      # that directory. Subprocess cwd itself is not configurable with MCP SDK 1.0.0 (see docs/spec/12).
      command: java
      args:
        - -jar
        - ${COUNTRIES_MCP_JAR:../countries-mcp-server/target/countries-mcp-server-0.1.0-SNAPSHOT.jar}
      env:
        COUNTRIES_MCP_REST_COUNTRIES_BASE_URL: https://api.restcountries.com/countries/v5
        COUNTRIES_MCP_REST_COUNTRIES_TIMEOUT_SECONDS: "10"
      env-passthrough:
        - REST_COUNTRIES_API_KEY
      transport: stdio
      timeout-seconds: 60
      tool-name: country_lookup
    weather:
      command: ../scripts/mcp-weather
      args: []
      env: {}
      env-passthrough:
        - WEATHER_API_KEY
        - WEATHER_API_URL
      transport: stdio
      timeout-seconds: 60
      tool-name: get-weather
  rag:
    jdbc-url: jdbc:postgresql://localhost:5432/assistant_rag
    username: assistant
    password: assistant
    top-k: 5
    relevance-threshold: 0.5
    source-url: https://www.cdq.com/products/cdq-fraud-guard
    chunk-max-size: 1000
    chunk-overlap: 200
    fetch-timeout-seconds: 30
  ollama:
    base-url: http://localhost:11434
  embedding:
    ollama-base-url: ${assistant.ollama.base-url}
    model-name: nomic-embed-text
    document-prefix: "search_document:"
    query-prefix: "search_query:"
  llm:
    ollama-base-url: ${assistant.ollama.base-url}
    model-name: qwen3:4b
    timeout-seconds: 120
  chat:
    stream-timeout-seconds: 150
    pool-size: 4
    queue-capacity: 32
