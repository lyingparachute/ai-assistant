spring:
  application:
    name: assistant-app-test
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration

assistant:
  mcp:
    countries:
      command: echo
      args:
        - stub-countries
      env: {}
      transport: stdio
      timeout-seconds: 5
      tool-name: country_lookup
    weather:
      command: echo
      args:
        - stub-weather
      env: {}
      transport: stdio
      timeout-seconds: 5
      tool-name: get-weather
  rag:
    jdbc-url: jdbc:postgresql://localhost:5432/assistant_rag_test
    username: assistant
    password: assistant
    top-k: 5
    relevance-threshold: 0.5
    source-url: https://www.cdq.com/products/cdq-fraud-guard
